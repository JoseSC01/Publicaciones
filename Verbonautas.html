<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misión Verbal: Rumbo a la Luna · v1.4.0</title>
<style>
  :root{
    --bg1:#050816;
    --bg2:#0b1d44;
    --panel:#0f1f46ee;
    --panel-soft:#13295ecc;
    --line:#7fd3ff;
    --text:#f7fbff;
    --muted:#c6d7f5;
    --ok:#7cffb6;
    --warn:#ffd36b;
    --bad:#ff8b8b;
    --accent:#91d0ff;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    font-family: "Trebuchet MS", Arial, sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 20% 20%, #173b7a 0%, transparent 22%),
      radial-gradient(circle at 80% 10%, #264d96 0%, transparent 18%),
      radial-gradient(circle at 70% 75%, #14325f 0%, transparent 20%),
      linear-gradient(180deg, var(--bg2), var(--bg1));
    overflow-x:hidden;
  }
  .stars, .stars2{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-repeat:repeat;
    opacity:.7;
  }
  .stars{
    background-image:
      radial-gradient(2px 2px at 20px 30px, #fff, transparent 60%),
      radial-gradient(1.5px 1.5px at 60px 90px, #fff, transparent 60%),
      radial-gradient(1.5px 1.5px at 110px 40px, #d5e9ff, transparent 60%),
      radial-gradient(2px 2px at 180px 120px, #fff, transparent 60%),
      radial-gradient(1.5px 1.5px at 240px 70px, #fff, transparent 60%);
    background-size:260px 180px;
    animation: drift 90s linear infinite;
  }
  .stars2{
    background-image:
      radial-gradient(1.2px 1.2px at 30px 20px, #fff, transparent 60%),
      radial-gradient(1.2px 1.2px at 80px 110px, #fff, transparent 60%),
      radial-gradient(1.2px 1.2px at 150px 50px, #fff, transparent 60%),
      radial-gradient(1.2px 1.2px at 210px 90px, #fff, transparent 60%);
    background-size:240px 160px;
    animation: drift 120s linear infinite reverse;
    opacity:.45;
  }
  @keyframes drift {
    from { transform:translateY(0) }
    to { transform:translateY(120px) }
  }
  .wrap{
    position:relative; z-index:1;
    width:min(980px, 94vw);
    margin:20px auto 40px;
  }
  .hud{
    display:flex; gap:12px; flex-wrap:wrap; justify-content:center;
    margin-bottom:14px;
  }
  .pill{
    background:#0e214d;
    border:1px solid #4baee6;
    border-radius:999px;
    padding:8px 14px;
    color:#e9f7ff;
    font-weight:700;
    box-shadow:0 0 12px rgba(64,161,255,.18);
  }
  .panel{
    background:linear-gradient(180deg, var(--panel), var(--panel-soft));
    border:1px solid rgba(127,211,255,.55);
    border-radius:22px;
    padding:24px;
    box-shadow:0 12px 32px rgba(0,0,0,.35), 0 0 20px rgba(74,178,255,.08);
    backdrop-filter: blur(4px);
  }
  h1, h2, h3, p { margin-top:0 }
  .title{
    text-align:center;
    font-size:clamp(1.8rem, 3vw, 2.8rem);
    margin:10px 0 8px;
    letter-spacing:.5px;
  }
  .subtitle{
    text-align:center;
    color:var(--muted);
    margin-bottom:18px;
  }
  .version{
    text-align:center;
    color:#a9c9ff;
    font-size:.95rem;
    margin-bottom:18px;
  }
  .grid-2{
    display:grid; gap:16px;
    grid-template-columns: repeat(auto-fit, minmax(240px,1fr));
  }
  .card{
    background:rgba(11,28,67,.65);
    border:1px solid rgba(145,208,255,.38);
    border-radius:18px;
    padding:18px;
  }
  .card h3{ color:#d8efff; margin-bottom:10px; }
  .card p{ color:var(--muted); line-height:1.45; }
  .actions{
    display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    margin-top:20px;
  }
  button{
    appearance:none; border:0; cursor:pointer;
    padding:12px 18px; border-radius:14px;
    font-size:1rem; font-weight:700;
    color:#08111f; background:linear-gradient(180deg,#b8ebff,#7dd6ff);
    box-shadow:0 8px 18px rgba(76,181,255,.22);
    transition:.15s transform ease, .15s opacity ease;
  }
  button:hover{ transform:translateY(-1px) }
  button.secondary{
    color:#eaf7ff; background:#19346d; border:1px solid #6bcaf0;
  }
  button.warn{
    color:#1f1200; background:linear-gradient(180deg,#ffe398,#ffc954);
  }
  button.ghost{
    color:#d8efff; background:transparent; border:1px dashed #81d8ff;
    box-shadow:none;
  }
  button:disabled{ opacity:.55; cursor:not-allowed; transform:none }
  input[type="text"], select{
    width:min(100%, 480px);
    padding:12px 14px;
    border-radius:12px;
    border:1px solid #7fd3ff;
    background:#0a1738;
    color:#fff;
    font-size:1rem;
    outline:none;
  }
  .center{ text-align:center }
  .question-box{
    background:rgba(8, 19, 45, .72);
    border:1px solid rgba(150,214,255,.36);
    border-radius:18px;
    padding:18px;
    margin:16px auto;
    max-width:760px;
  }
  .question-title{
    text-align:center;
    font-weight:800;
    color:#dcf5ff;
    margin-bottom:12px;
    font-size:1.15rem;
  }
  .aligned{
    width:min(100%, 620px);
    margin:0 auto;
    font-family: "Consolas","Courier New",monospace;
    font-size:1.06rem;
  }
  .row{
    display:grid;
    grid-template-columns: 120px 16px 1fr;
    gap:6px;
    margin:6px 0;
    align-items:start;
  }
  .row .k{
    text-align:right;
    color:#8fd3ff;
    font-weight:700;
  }
  .row .c{
    text-align:center;
    color:#9fe7ff;
  }
  .row .v{
    text-align:left;
    color:#f8fdff;
  }
  .small{
    font-size:.94rem;
    color:var(--muted);
  }
  .intro-list, .help-list{
    margin:0; padding-left:20px; line-height:1.55;
  }
  .feedback{
    margin-top:16px;
    padding:16px;
    border-radius:16px;
    text-align:left;
    max-width:760px;
    margin-left:auto; margin-right:auto;
    border:1px solid rgba(255,255,255,.16);
  }
  .ok{ background:rgba(24,94,60,.33); border-color:rgba(124,255,182,.45) }
  .bad{ background:rgba(100,28,28,.34); border-color:rgba(255,139,139,.5) }
  .warnbox{ background:rgba(120,92,16,.30); border-color:rgba(255,211,107,.45) }
  .feedback h3{ margin-bottom:8px }
  .summary{
    display:grid; gap:14px;
    grid-template-columns: repeat(auto-fit, minmax(230px,1fr));
  }
  .badge{
    display:inline-block;
    padding:7px 12px;
    border-radius:999px;
    font-weight:800;
    margin-top:8px;
  }
  .b1{ background:rgba(255,220,122,.18); color:#ffe394; border:1px solid rgba(255,220,122,.35) }
  .b2{ background:rgba(159,221,255,.16); color:#b9e9ff; border:1px solid rgba(159,221,255,.35) }
  .b3{ background:rgba(124,255,182,.16); color:#b9ffd9; border:1px solid rgba(124,255,182,.35) }
  .moon{
    width:92px; height:92px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff8d8, #d9d4b4 60%, #a59f86);
    box-shadow:0 0 20px rgba(255,246,184,.22);
    margin:0 auto 14px;
  }
  .footer-note{ color:#9db7db; text-align:center; font-size:.9rem; margin-top:18px }
  .hidden{ display:none }
  @media (max-width:640px){
    .panel{ padding:18px }
    .row{ grid-template-columns: 95px 16px 1fr; font-size:.98rem; }
  }
</style>
</head>
<body>
<div class="stars"></div>
<div class="stars2"></div>
<div class="wrap">
  <div class="hud" id="hud"></div>
  <div class="panel" id="app"></div>
  <div class="footer-note">Misión Verbal · Rumbo a la Luna · v1.4.0</div>
</div>

<script>
(() => {
  const VERSION = "1.4.0";
  const BUILD_TAG = "mision-verbal-luna_v1.4.0_2026-04-10";

  const personas = [
    {key:"1s", sujeto:"yo", persona:"primera", numero:"singular"},
    {key:"2s", sujeto:"tú", persona:"segunda", numero:"singular"},
    {key:"3s", sujeto:"él/ella", persona:"tercera", numero:"singular", sujetosValidos:["él","ella","el","ella"]},
    {key:"1p", sujeto:"nosotros", persona:"primera", numero:"plural"},
    {key:"2p", sujeto:"vosotros", persona:"segunda", numero:"plural"},
    {key:"3p", sujeto:"ellos/ellas", persona:"tercera", numero:"plural", sujetosValidos:["ellos","ellas"]}
  ];

  const verbos = [
    "hablar","cantar","saltar","caminar","mirar",
    "comer","beber","correr",
    "vivir","abrir"
  ];

  const tiempoDefs = [
    {id:"presente", familia:"presente", tipo:"simple", nombre:"presente simple"},
    {id:"preteritoPerfectoCompuesto", familia:"pretérito", tipo:"perfecto compuesto", nombre:"pretérito perfecto compuesto"},
    {id:"preteritoImperfecto", familia:"pretérito", tipo:"imperfecto", nombre:"pretérito imperfecto"},
    {id:"preteritoPerfectoSimple", familia:"pretérito", tipo:"perfecto simple", nombre:"pretérito perfecto simple"},
    {id:"preteritoPluscuamperfecto", familia:"pretérito", tipo:"pluscuamperfecto", nombre:"pretérito pluscuamperfecto"},
    {id:"preteritoAnterior", familia:"pretérito", tipo:"anterior", nombre:"pretérito anterior"},
    {id:"futuroSimple", familia:"futuro", tipo:"simple", nombre:"futuro simple"},
    {id:"futuroCompuesto", familia:"futuro", tipo:"compuesto", nombre:"futuro compuesto"},
    {id:"condicionalSimple", familia:"condicional", tipo:"simple", nombre:"condicional simple"},
    {id:"condicionalCompuesto", familia:"condicional", tipo:"compuesto", nombre:"condicional compuesto"}
  ];

  const tiposPorFamilia = {
    "presente": ["simple"],
    "pretérito": ["perfecto compuesto","imperfecto","perfecto simple","pluscuamperfecto","anterior"],
    "futuro": ["simple","compuesto"],
    "condicional": ["simple","compuesto"]
  };

  const auxiliares = {
    haberPresente: ["he","has","ha","hemos","habéis","han"],
    haberImperfecto: ["había","habías","había","habíamos","habíais","habían"],
    haberPreteritoSimple: ["hube","hubiste","hubo","hubimos","hubisteis","hubieron"],
    haberFuturo: ["habré","habrás","habrá","habremos","habréis","habrán"],
    haberCondicional: ["habría","habrías","habría","habríamos","habríais","habrían"]
  };

  function getGrupo(verbo){
    if(verbo.endsWith("ar")) return "ar";
    if(verbo.endsWith("er")) return "er";
    return "ir";
  }

  function participioRegular(verbo){
    const raiz = verbo.slice(0,-2);
    return getGrupo(verbo) === "ar" ? raiz + "ado" : raiz + "ido";
  }

  function conjugacionRegular(verbo, tiempoId, idx){
    const raiz = verbo.slice(0,-2);
    const grupo = getGrupo(verbo);
    const part = participioRegular(verbo);

    const tablas = {
      presente: {
        ar:["hablo","hablas","habla","hablamos","habláis","hablan"].map((x,i)=>raiz+["o","as","a","amos","áis","an"][i]),
        er:["como","comes","come","comemos","coméis","comen"].map((x,i)=>raiz+["o","es","e","emos","éis","en"][i]),
        ir:["vivo","vives","vive","vivimos","vivís","viven"].map((x,i)=>raiz+["o","es","e","imos","ís","en"][i])
      },
      preteritoImperfecto: {
        ar:["aba","abas","aba","ábamos","abais","aban"].map(t=>raiz+t),
        er:["ía","ías","ía","íamos","íais","ían"].map(t=>raiz+t),
        ir:["ía","ías","ía","íamos","íais","ían"].map(t=>raiz+t)
      },
      preteritoPerfectoSimple: {
        ar:["é","aste","ó","amos","asteis","aron"].map(t=>raiz+t),
        er:["í","iste","ió","imos","isteis","ieron"].map(t=>raiz+t),
        ir:["í","iste","ió","imos","isteis","ieron"].map(t=>raiz+t)
      },
      futuroSimple: {
        ar:["é","ás","á","emos","éis","án"].map(t=>verbo+t),
        er:["é","ás","á","emos","éis","án"].map(t=>verbo+t),
        ir:["é","ás","á","emos","éis","án"].map(t=>verbo+t)
      },
      condicionalSimple: {
        ar:["ía","ías","ía","íamos","íais","ían"].map(t=>verbo+t),
        er:["ía","ías","ía","íamos","íais","ían"].map(t=>verbo+t),
        ir:["ía","ías","ía","íamos","íais","ían"].map(t=>verbo+t)
      }
    };

    switch(tiempoId){
      case "presente": return tablas.presente[grupo][idx];
      case "preteritoImperfecto": return tablas.preteritoImperfecto[grupo][idx];
      case "preteritoPerfectoSimple": return tablas.preteritoPerfectoSimple[grupo][idx];
      case "futuroSimple": return tablas.futuroSimple[grupo][idx];
      case "condicionalSimple": return tablas.condicionalSimple[grupo][idx];
      case "preteritoPerfectoCompuesto": return auxiliares.haberPresente[idx] + " " + part;
      case "preteritoPluscuamperfecto": return auxiliares.haberImperfecto[idx] + " " + part;
      case "preteritoAnterior": return auxiliares.haberPreteritoSimple[idx] + " " + part;
      case "futuroCompuesto": return auxiliares.haberFuturo[idx] + " " + part;
      case "condicionalCompuesto": return auxiliares.haberCondicional[idx] + " " + part;
      default: return "";
    }
  }

  function stripDiacritics(s){
    return s.normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  }

  function normalizeLoose(s){
    return stripDiacritics(String(s).toLowerCase())
      .replace(/[.,;:!?¡¿]/g," ")
      .replace(/\s+/g," ")
      .trim();
  }

  function normalizeStrictSpace(s){
    return String(s).toLowerCase().replace(/\s+/g," ").trim();
  }

  function capitalize(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

  function choice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function formatDateTime(date){
    return new Intl.DateTimeFormat('es-ES', {
      dateStyle:'short',
      timeStyle:'medium'
    }).format(date);
  }

  function getRango(points){
    if(points >= 160) return {label:"Comandante lunar", cls:"b3"};
    if(points >= 110) return {label:"Piloto espacial", cls:"b2"};
    return {label:"Astronauta en prácticas", cls:"b1"};
  }

  const state = {
    player:"",
    missionType:null,
    missionLabel:"",
    questions:[],
    current:0,
    points:0,
    energy:50,
    streak:0,
    hints:0,
    usedHintThisQuestion:false,
    startedAt:null,
    finishedAt:null,
    awaitingNext:false,
    lastFeedback:null
  };

  const app = document.getElementById("app");
  const hud = document.getElementById("hud");

  function renderHud(){
    if(!state.player){
      hud.innerHTML = "";
      return;
    }
    hud.innerHTML = `
      <div class="pill">👤 ${escapeHtml(state.player)}</div>
      <div class="pill">🧭 ${escapeHtml(state.missionLabel || "Sin itinerario")}</div>
      <div class="pill">🔋 Energía: ${state.energy}</div>
      <div class="pill">⭐ Puntos: ${state.points}</div>
      <div class="pill">💡 Pistas: ${state.hints}</div>
      <div class="pill">📍 ${Math.min(state.current + (state.awaitingNext?1:0), state.questions.length)}/${state.questions.length || 0}</div>
    `;
  }

  function introView(){
    renderHud();
    app.innerHTML = `
      <div class="moon"></div>
      <h1 class="title">🚀 Misión Verbal: Rumbo a la Luna</h1>
      <p class="subtitle">Practica los tiempos verbales del <strong>modo indicativo</strong> y consigue que tu nave llegue a la Luna.</p>
      <p class="version">Versión ${VERSION} · ${BUILD_TAG}</p>

      <div class="card center" style="max-width:720px;margin:0 auto 18px;">
        <h3>Antes de despegar</h3>
        <p>Escribe tu nombre o alias para personalizar la misión.</p>
        <input type="text" id="playerName" maxlength="24" placeholder="Ejemplo: Luna, Mario, Astro5" />
        <div class="actions">
          <button onclick="Game.savePlayer()">Comenzar misión</button>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3>Verbo modelo: <strong>comer</strong></h3>
          <ul class="intro-list">
            <li>Presente simple → <strong>yo como</strong></li>
            <li>Pretérito perfecto compuesto → <strong>yo he comido</strong></li>
            <li>Pretérito imperfecto → <strong>yo comía</strong></li>
            <li>Pretérito perfecto simple → <strong>yo comí</strong></li>
            <li>Pretérito pluscuamperfecto → <strong>yo había comido</strong></li>
            <li>Pretérito anterior → <strong>yo hube comido</strong></li>
            <li>Futuro simple → <strong>yo comeré</strong></li>
            <li>Futuro compuesto → <strong>yo habré comido</strong></li>
            <li>Condicional simple → <strong>yo comería</strong></li>
            <li>Condicional compuesto → <strong>yo habría comido</strong></li>
          </ul>
        </div>
        <div class="card">
          <h3>Cómo ganar energía</h3>
          <ul class="help-list">
            <li>Acierto sin pista: <strong>+10 puntos y +10 energía</strong></li>
            <li>Acierto con pista: <strong>+6 puntos y +6 energía</strong></li>
            <li>Fallo: <strong>-5 energía</strong></li>
            <li>Racha de 3 aciertos seguidos: <strong>+10 puntos extra</strong></li>
          </ul>
          <p class="small" style="margin-top:12px;">En conjugación se acepta la forma verbal sola o con el sujeto correcto delante. Si falta una tilde, la respuesta se puede dar por válida, pero se indicará cómo escribirla mejor.</p>
        </div>
      </div>
    `;
  }

  function missionSelectView(){
    renderHud();
    app.innerHTML = `
      <h1 class="title">🛸 Elige tu itinerario</h1>
      <p class="subtitle">Hola, <strong>${escapeHtml(state.player)}</strong>. Escoge la ruta de entrenamiento antes del despegue.</p>
      <div class="grid-2">
        <div class="card">
          <h3>🌍 Itinerario 1 · Despegue rápido</h3>
          <p>Escribe la forma verbal correcta. Hay <strong>20 preguntas</strong>: dos por cada tiempo del modo indicativo.</p>
          <div class="actions"><button onclick="Game.startMission(1)">Empezar itinerario 1</button></div>
        </div>
        <div class="card">
          <h3>🌕 Itinerario 2 · Radar lingüístico</h3>
          <p>Analiza frases y elige el tiempo correcto con listas. Hay <strong>20 preguntas</strong>: dos por cada tiempo.</p>
          <div class="actions"><button onclick="Game.startMission(2)">Empezar itinerario 2</button></div>
        </div>
        <div class="card" style="grid-column:1 / -1;">
          <h3>🌠 Itinerario 3 · Misión completa</h3>
          <p>Combina conjugación y análisis. Hay <strong>20 preguntas</strong>: una de conjugación y una de análisis por cada tiempo.</p>
          <div class="actions"><button onclick="Game.startMission(3)">Empezar itinerario 3</button></div>
        </div>
      </div>
      <div class="actions">
        <button class="secondary" onclick="Game.showHelp()">Ayuda</button>
      </div>
    `;
  }

  function showHelpView(){
    renderHud();
    app.innerHTML = `
      <h1 class="title">❓ Ayuda de cabina</h1>
      <div class="grid-2">
        <div class="card">
          <h3>Banco de verbos</h3>
          <p>${verbos.join(", ")}</p>
          <h3>Tiempos trabajados</h3>
          <ul class="help-list">
            ${tiempoDefs.map(t => `<li>${capitalize(t.nombre)}</li>`).join("")}
          </ul>
        </div>
        <div class="card">
          <h3>Cómo responder</h3>
          <ul class="help-list">
            <li>En <strong>conjugación</strong>, escribe la forma correcta.</li>
            <li>Puedes escribir <strong>solo la forma verbal</strong> o <strong>el sujeto correcto + la forma verbal</strong>.</li>
            <li>En <strong>análisis</strong>, elige familia, tipo, persona y número.</li>
            <li>Si usas pista, ganarás menos puntos.</li>
          </ul>
        </div>
      </div>
      <div class="actions">
        <button onclick="Game.backFromHelp()">Volver</button>
      </div>
    `;
  }

  function createQuestionConjugacion(tiempoId){
    const verbo = choice(verbos);
    const personaIdx = Math.floor(Math.random()*personas.length);
    const tiempo = tiempoDefs.find(t => t.id === tiempoId);
    return {
      mode: "conjugacion",
      verbo,
      personaIdx,
      tiempoId,
      tiempoNombre: tiempo.nombre,
      familia: tiempo.familia,
      tipo: tiempo.tipo,
      respuesta: conjugacionRegular(verbo, tiempoId, personaIdx)
    };
  }

  function createQuestionAnalisis(tiempoId){
    const verbo = choice(verbos);
    const personaIdx = Math.floor(Math.random()*personas.length);
    const tiempo = tiempoDefs.find(t => t.id === tiempoId);
    const forma = conjugacionRegular(verbo, tiempoId, personaIdx);
    const sujeto = personas[personaIdx].sujeto;
    const frase = `${capitalize(sujeto)} ${forma}.`;
    return {
      mode: "analisis",
      verbo,
      personaIdx,
      tiempoId,
      tiempoNombre: tiempo.nombre,
      familia: tiempo.familia,
      tipo: tiempo.tipo,
      frase
    };
  }

  function buildMission(type){
    if(type === 1){
      let out = [];
      tiempoDefs.forEach(t => {
        out.push(createQuestionConjugacion(t.id));
        out.push(createQuestionConjugacion(t.id));
      });
      return shuffle(out);
    }
    if(type === 2){
      let out = [];
      tiempoDefs.forEach(t => {
        out.push(createQuestionAnalisis(t.id));
        out.push(createQuestionAnalisis(t.id));
      });
      return shuffle(out);
    }
    let out = [];
    tiempoDefs.forEach(t => {
      out.push(createQuestionConjugacion(t.id));
      out.push(createQuestionAnalisis(t.id));
    });
    return shuffle(out);
  }

  function renderQuestion(){
    renderHud();
    const q = state.questions[state.current];
    if(!q){
      return renderSummary();
    }
    const progress = state.current + 1;
    const body = q.mode === "conjugacion" ? renderConjugationQuestion(q) : renderAnalysisQuestion(q);

    app.innerHTML = `
      <h1 class="title">🚀 Modo indicativo</h1>
      <p class="subtitle">Pregunta ${progress} de ${state.questions.length}</p>
      ${body}
      <div class="actions">
        <button class="secondary" onclick="Game.showHelp()">Ayuda</button>
        ${q.mode === "conjugacion" ? `<button class="warn" onclick="Game.useHint()">Pista</button>` : ``}
      </div>
    `;

    if(q.mode === "analisis"){
      syncTipoOptions();
    }
  }

  function renderConjugationQuestion(q){
    const p = personas[q.personaIdx];
    return `
      <div class="question-box">
        <div class="question-title">Escribe la forma correcta</div>
        <div class="aligned">
          <div class="row"><div class="k">Verbo</div><div class="c">:</div><div class="v">${escapeHtml(q.verbo)}</div></div>
          <div class="row"><div class="k">Tiempo</div><div class="c">:</div><div class="v">${escapeHtml(q.tiempoNombre)}</div></div>
          <div class="row"><div class="k">Persona</div><div class="c">:</div><div class="v">${escapeHtml(p.persona)} persona del ${escapeHtml(p.numero)}</div></div>
        </div>
        <div class="center" style="margin-top:18px;">
          <input type="text" id="answerText" autocomplete="off" placeholder="Escribe tu respuesta" />
        </div>
        <div class="actions">
          <button onclick="Game.submitCurrent()">Responder</button>
        </div>
      </div>
    `;
  }

  function renderAnalysisQuestion(q){
    return `
      <div class="question-box">
        <div class="question-title">Identifica el tiempo de la frase</div>
        <div class="aligned">
          <div class="row"><div class="k">Frase</div><div class="c">:</div><div class="v">${escapeHtml(q.frase)}</div></div>
        </div>
        <div class="center" style="margin-top:18px;">
          <div style="display:grid;gap:12px;justify-items:center;">
            <select id="selFamilia" onchange="Game.updateTipoOptions()">
              <option value="">Tiempo verbal</option>
              <option value="presente">Presente</option>
              <option value="pretérito">Pretérito</option>
              <option value="futuro">Futuro</option>
              <option value="condicional">Condicional</option>
            </select>
            <select id="selTipo">
              <option value="">Tipo de tiempo</option>
            </select>
            <select id="selPersona">
              <option value="">Persona</option>
              <option value="primera">Primera</option>
              <option value="segunda">Segunda</option>
              <option value="tercera">Tercera</option>
            </select>
            <select id="selNumero">
              <option value="">Número</option>
              <option value="singular">Singular</option>
              <option value="plural">Plural</option>
            </select>
          </div>
        </div>
        <div class="actions">
          <button onclick="Game.submitCurrent()">Responder</button>
        </div>
      </div>
    `;
  }

  function syncTipoOptions(){
    const selFamilia = document.getElementById("selFamilia");
    const selTipo = document.getElementById("selTipo");
    if(!selFamilia || !selTipo) return;
    const prev = selTipo.value;
    const familia = selFamilia.value;
    const opts = familia ? tiposPorFamilia[familia] : [];
    selTipo.innerHTML = `<option value="">Tipo de tiempo</option>` + opts.map(x => `<option value="${x}">${capitalize(x)}</option>`).join("");
    if(opts.includes(prev)) selTipo.value = prev;
  }

  function checkConjugacion(q){
    const raw = document.getElementById("answerText").value || "";
    const trimmed = raw.trim();
    const normalizedInput = normalizeLoose(trimmed);
    const normalizedTarget = normalizeLoose(q.respuesta);

    const p = personas[q.personaIdx];
    const validSubjects = [p.sujeto];
    if(p.sujetosValidos) validSubjects.push(...p.sujetosValidos);
    if(p.sujeto.includes("/")) validSubjects.push(...p.sujeto.split("/"));
    const normalizedWithSubjects = [...new Set(validSubjects.map(s => normalizeLoose(s + " " + q.respuesta)))];

    const isCorrect = normalizedInput === normalizedTarget || normalizedWithSubjects.includes(normalizedInput);

    let accentNote = "";
    if(isCorrect){
      const strictTarget = normalizeStrictSpace(q.respuesta);
      const strictWithSubjects = validSubjects.map(s => normalizeStrictSpace((s + " " + q.respuesta).replace(/\s+/g," ")));
      const strictInput = normalizeStrictSpace(trimmed);
      const exact = strictInput === strictTarget || strictWithSubjects.includes(strictInput);
      if(!exact){
        accentNote = `La respuesta es correcta. Para escribirla perfecto, conviene poner las tildes así: <strong>${escapeHtml(q.respuesta)}</strong>.`;
      }
    }

    return {
      ok:isCorrect,
      correctLabel:q.respuesta,
      note:accentNote,
      explanation:`<p><strong>Modo indicativo · ${escapeHtml(q.tiempoNombre)}</strong></p><p>Con el verbo <strong>${escapeHtml(q.verbo)}</strong> y la <strong>${escapeHtml(personas[q.personaIdx].persona)} persona del ${escapeHtml(personas[q.personaIdx].numero)}</strong>, la forma correcta es <strong>${escapeHtml(q.respuesta)}</strong>.</p>`
    };
  }

  function checkAnalisis(q){
    const familia = (document.getElementById("selFamilia").value || "").toLowerCase();
    const tipo = (document.getElementById("selTipo").value || "").toLowerCase();
    const persona = (document.getElementById("selPersona").value || "").toLowerCase();
    const numero = (document.getElementById("selNumero").value || "").toLowerCase();
    const p = personas[q.personaIdx];

    const ok = familia === q.familia.toLowerCase()
      && tipo === q.tipo.toLowerCase()
      && persona === p.persona.toLowerCase()
      && numero === p.numero.toLowerCase();

    return {
      ok,
      correctLabel:`${capitalize(q.familia)} · ${capitalize(q.tipo)} · ${capitalize(p.persona)} persona · ${capitalize(p.numero)}`,
      note:"",
      explanation:`<p>La frase <strong>${escapeHtml(q.frase)}</strong> está en <strong>modo indicativo</strong> y corresponde a <strong>${escapeHtml(q.tiempoNombre)}</strong>.</p><p>Además, está en <strong>${escapeHtml(p.persona)} persona</strong> del <strong>${escapeHtml(p.numero)}</strong>.</p>`
    };
  }

  function applyScore(ok){
    let bonusText = "";
    if(ok){
      if(state.usedHintThisQuestion){
        state.points += 6;
        state.energy += 6;
      } else {
        state.points += 10;
        state.energy += 10;
      }
      state.streak += 1;
      if(state.streak > 0 && state.streak % 3 === 0){
        state.points += 10;
        bonusText = `<p><strong>🚀 Bonus de racha:</strong> has conseguido 3 aciertos seguidos. Ganas <strong>+10 puntos</strong> extra.</p>`;
      }
    } else {
      state.energy -= 5;
      state.streak = 0;
    }
    if(state.energy < 0) state.energy = 0;
    return bonusText;
  }

  function showFeedback(result){
    state.awaitingNext = true;
    renderHud();
    const q = state.questions[state.current];
    const bonusText = applyScore(result.ok);
    const className = result.ok ? (result.note ? "feedback warnbox" : "feedback ok") : "feedback bad";
    const title = result.ok ? `✅ Buen trabajo, ${escapeHtml(state.player)}` : `❌ Vamos a revisarlo, ${escapeHtml(state.player)}`;
    const pointsText = result.ok
      ? (state.usedHintThisQuestion ? "<p>Has acertado con pista: <strong>+6 puntos</strong> y <strong>+6 energía</strong>.</p>" : "<p>Has acertado sin pista: <strong>+10 puntos</strong> y <strong>+10 energía</strong>.</p>")
      : "<p>Esta vez pierdes <strong>5 de energía</strong>, pero puedes seguir avanzando.</p>";

    app.innerHTML = `
      <h1 class="title">🚀 Modo indicativo</h1>
      <p class="subtitle">Pregunta ${state.current + 1} de ${state.questions.length}</p>
      <div class="question-box">
        ${q.mode === "conjugacion" ? `
          <div class="aligned">
            <div class="row"><div class="k">Verbo</div><div class="c">:</div><div class="v">${escapeHtml(q.verbo)}</div></div>
            <div class="row"><div class="k">Tiempo</div><div class="c">:</div><div class="v">${escapeHtml(q.tiempoNombre)}</div></div>
            <div class="row"><div class="k">Persona</div><div class="c">:</div><div class="v">${escapeHtml(personas[q.personaIdx].persona)} persona del ${escapeHtml(personas[q.personaIdx].numero)}</div></div>
          </div>
        ` : `
          <div class="aligned">
            <div class="row"><div class="k">Frase</div><div class="c">:</div><div class="v">${escapeHtml(q.frase)}</div></div>
          </div>
        `}
      </div>
      <div class="${className}">
        <h3>${title}</h3>
        ${pointsText}
        ${result.note ? `<p>⚠️ ${result.note}</p>` : ""}
        <p><strong>Respuesta esperada:</strong> ${escapeHtml(result.correctLabel)}</p>
        ${result.explanation}
        ${bonusText}
      </div>
      <div class="actions">
        <button onclick="Game.nextQuestion()">Siguiente pregunta ➜</button>
      </div>
    `;
  }

  function renderSummary(){
    state.finishedAt = new Date();
    renderHud();
    const rank = getRango(state.points);
    app.innerHTML = `
      <h1 class="title">🌕 Misión completada</h1>
      <p class="subtitle">Has terminado el entrenamiento del modo indicativo.</p>
      <div class="summary">
        <div class="card center">
          <h3>Resumen del jugador</h3>
          <p><strong>Nombre:</strong> ${escapeHtml(state.player)}</p>
          <p><strong>Fecha y hora:</strong> ${escapeHtml(formatDateTime(state.finishedAt))}</p>
          <p><strong>Itinerario:</strong> ${escapeHtml(state.missionLabel)}</p>
        </div>
        <div class="card center">
          <h3>Resultados</h3>
          <p><strong>Energía final:</strong> ${state.energy}</p>
          <p><strong>Puntos:</strong> ${state.points}</p>
          <p><strong>Pistas usadas:</strong> ${state.hints}</p>
          <span class="badge ${rank.cls}">${escapeHtml(rank.label)}</span>
        </div>
      </div>
      <div class="actions">
        <button onclick="Game.goMenu()">Volver al menú</button>
        <button class="secondary" onclick="Game.restart()">Nueva misión</button>
      </div>
    `;
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[m]));
  }

  window.Game = {
    savePlayer(){
      const input = document.getElementById("playerName");
      state.player = (input && input.value.trim()) || "Astronauta";
      state.missionType = null;
      state.missionLabel = "";
      renderHud();
      missionSelectView();
    },
    startMission(type){
      state.missionType = type;
      state.missionLabel = type === 1 ? "Itinerario 1 · Despegue rápido" : type === 2 ? "Itinerario 2 · Radar lingüístico" : "Itinerario 3 · Misión completa";
      state.questions = buildMission(type);
      state.current = 0;
      state.points = 0;
      state.energy = 50;
      state.streak = 0;
      state.hints = 0;
      state.usedHintThisQuestion = false;
      state.startedAt = new Date();
      state.finishedAt = null;
      state.awaitingNext = false;
      renderQuestion();
    },
    submitCurrent(){
      const q = state.questions[state.current];
      if(!q || state.awaitingNext) return;
      const result = q.mode === "conjugacion" ? checkConjugacion(q) : checkAnalisis(q);
      showFeedback(result);
    },
    nextQuestion(){
      if(!state.awaitingNext) return;
      state.current += 1;
      state.usedHintThisQuestion = false;
      state.awaitingNext = false;
      if(state.current >= state.questions.length){
        renderSummary();
      } else {
        renderQuestion();
      }
    },
    useHint(){
      const q = state.questions[state.current];
      if(!q || q.mode !== "conjugacion" || state.awaitingNext || state.usedHintThisQuestion) return;
      state.usedHintThisQuestion = true;
      state.hints += 1;
      const suggestion = q.respuesta.length <= 6 ? q.respuesta.charAt(0) : q.respuesta.slice(0, Math.min(5, q.respuesta.length));
      app.insertAdjacentHTML("beforeend", `
        <div class="feedback warnbox">
          <h3>💡 Pista</h3>
          <p>${escapeHtml(state.player)}, la respuesta empieza así: <strong>${escapeHtml(suggestion)}</strong>…</p>
          <p class="small">Si aciertas después de usar la pista, ganarás menos puntos.</p>
        </div>
      `);
    },
    showHelp(){ showHelpView(); },
    backFromHelp(){
      if(state.questions.length && state.current < state.questions.length && !state.finishedAt){
        renderQuestion();
      } else {
        missionSelectView();
      }
    },
    updateTipoOptions(){ syncTipoOptions(); },
    goMenu(){ missionSelectView(); },
    restart(){
      state.player = "";
      state.questions = [];
      state.current = 0;
      state.points = 0;
      state.energy = 50;
      state.hints = 0;
      state.missionLabel = "";
      introView();
    }
  };

  introView();
})();
</script>
</body>
</html>
